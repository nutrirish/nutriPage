<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Request a private NutriRish nutrition coaching consultation."
    />
    <title>Private Consultation | NutriRish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,600;6..96,700;6..96,800&family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="contact-page">
    <div class="grain" aria-hidden="true"></div>
    <header class="site-header contact-header">
      <a class="brand" href="./index.html" aria-label="Return to NutriRish home">
        <span>NR</span>
        <strong>NutriRish</strong>
      </a>
      <nav aria-label="Contact navigation">
        <a href="./index.html">Home</a>
        <a href="https://www.instagram.com/nutrirish" target="_blank" rel="noreferrer">Instagram</a>
      </nav>
    </header>

    <main class="contact-shell">
      <section class="contact-intro">
        <p class="eyebrow">Private consultation</p>
        <h1>Let us build the protocol around your life.</h1>
        <p>
          Share a few details. This form is the current contact hand-off for private
          NutriRish coaching enquiries.
        </p>
        <div class="contact-direct">
          <a href="mailto:nutrirish@gmail.com">nutrirish@gmail.com</a>
          <a href="https://www.instagram.com/nutrirish" target="_blank" rel="noreferrer">@nutrirish</a>
        </div>
      </section>

      <form class="contact-form" action="mailto:nutrirish@gmail.com" method="post" enctype="text/plain">
        <label>
          <span>Name</span>
          <input name="name" type="text" autocomplete="name" required />
        </label>
        <label>
          <span>Email</span>
          <input name="email" type="email" autocomplete="email" required />
        </label>
        <label>
          <span>Primary goal</span>
          <select name="goal" required>
            <option value="">Select a focus</option>
            <option>Body composition</option>
            <option>Executive performance</option>
            <option>Travel-proof nutrition</option>
            <option>Private lifestyle integration</option>
          </select>
        </label>
        <label>
          <span>What should we know?</span>
          <textarea name="details" rows="6" placeholder="Schedule, goals, current challenges, and preferred timeline"></textarea>
        </label>
        <button class="button primary" type="submit">Send private enquiry</button>
      </form>
    </main>
  </body>
</html>
